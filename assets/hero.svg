<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF00FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B00FF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#7B00FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <clipPath id="scanClip">
      <rect x="0" y="0" width="900" height="300"/>
    </clipPath>
  </defs>

  <style>
    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(20px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes scanline {
      0% { transform: translateY(-10px); }
      100% { transform: translateY(310px); }
    }
    @keyframes glitch1 {
      0%, 90%, 100% { transform: translate(0, 0); opacity: 1; }
      92% { transform: translate(-3px, 1px); opacity: 0.8; }
      94% { transform: translate(3px, -1px); opacity: 0.9; }
      96% { transform: translate(-2px, -1px); opacity: 0.7; }
      98% { transform: translate(2px, 1px); opacity: 0.85; }
    }
    @keyframes glitch2 {
      0%, 88%, 100% { transform: translate(0, 0); clip-path: none; }
      90% { transform: translate(4px, 0); clip-path: inset(20% 0 60% 0); }
      93% { transform: translate(-4px, 0); clip-path: inset(50% 0 20% 0); }
      96% { transform: translate(2px, 0); clip-path: inset(10% 0 70% 0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes particleFade {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes horizLine {
      0% { stroke-dashoffset: 900; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    .grid-group { animation: gridScroll 4s linear infinite; }
    .title-main { animation: glitch1 6s ease-in-out infinite; }
    .title-glitch { animation: glitch2 6s ease-in-out infinite; }
    .scanline-bar { animation: scanline 4s linear infinite; }
    .subtitle { animation: float 5s ease-in-out infinite; }
    .pulse-line { animation: pulse 3s ease-in-out infinite; }
    .particle { animation: particleFade 3s ease-in-out infinite; }
    .horiz-line { animation: horizLine 3s ease-out forwards; }
    .corner-accent { animation: subtlePulse 4s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="300" fill="#0D1117"/>

  <!-- Perspective grid -->
  <g class="grid-group" opacity="0.15">
    <line x1="450" y1="120" x2="0" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="100" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="200" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="300" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="400" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="500" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="600" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="700" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="800" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="900" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="900" y2="210" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="0" y1="270" x2="900" y2="270" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#7B00FF" stroke-width="0.5"/>
  </g>

  <!-- Gradient overlay on grid -->
  <rect x="0" y="120" width="900" height="180" fill="url(#gridGrad)"/>

  <!-- Floating particles -->
  <circle cx="120" cy="60" r="1.5" fill="#00FFFF" class="particle" opacity="0"/>
  <circle cx="780" cy="80" r="1" fill="#FF00FF" class="particle" opacity="0" style="animation-delay: 0.5s"/>
  <circle cx="300" cy="40" r="1.2" fill="#7B00FF" class="particle" opacity="0" style="animation-delay: 1s"/>
  <circle cx="600" cy="50" r="1.8" fill="#00FFFF" class="particle" opacity="0" style="animation-delay: 1.5s"/>
  <circle cx="200" cy="90" r="1" fill="#FF00FF" class="particle" opacity="0" style="animation-delay: 2s"/>
  <circle cx="700" cy="35" r="1.3" fill="#00FFFF" class="particle" opacity="0" style="animation-delay: 2.5s"/>
  <circle cx="500" cy="70" r="0.8" fill="#FF00FF" class="particle" opacity="0" style="animation-delay: 0.8s"/>
  <circle cx="80" cy="130" r="1.1" fill="#7B00FF" class="particle" opacity="0" style="animation-delay: 1.8s"/>
  <circle cx="820" cy="140" r="1.4" fill="#00FFFF" class="particle" opacity="0" style="animation-delay: 0.3s"/>
  <circle cx="400" cy="25" r="0.9" fill="#FF00FF" class="particle" opacity="0" style="animation-delay: 1.2s"/>

  <!-- Corner accents -->
  <g class="corner-accent">
    <polyline points="10,10 10,40 40,40" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
    <polyline points="890,10 890,40 860,40" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
    <polyline points="10,290 10,260 40,260" fill="none" stroke="#FF00FF" stroke-width="1" opacity="0.5"/>
    <polyline points="890,290 890,260 860,260" fill="none" stroke="#FF00FF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Horizontal accent lines -->
  <line x1="0" y1="160" x2="900" y2="160" stroke="url(#lineGrad)" stroke-width="1" class="pulse-line"/>
  <line x1="0" y1="162" x2="900" y2="162" stroke="url(#lineGrad)" stroke-width="0.3" class="pulse-line" style="animation-delay: 0.5s"/>

  <!-- Scanline effect -->
  <g clip-path="url(#scanClip)">
    <rect class="scanline-bar" x="0" y="-10" width="900" height="4" fill="#00FFFF" opacity="0.03"/>
  </g>

  <!-- Main title - glitch layer (behind) -->
  <text class="title-glitch" x="450" y="110" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="68" font-weight="bold" fill="#FF00FF" opacity="0.4" filter="url(#glow)">15fps</text>

  <!-- Main title -->
  <text class="title-main" x="450" y="110" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="68" font-weight="bold" fill="url(#titleGrad)" filter="url(#glowStrong)">15fps</text>

  <!-- Subtitle -->
  <text class="subtitle" x="450" y="145" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="16" fill="#A0A0FF" letter-spacing="6">FRONTEND ENGINEER</text>

  <!-- Bottom decoration line -->
  <line class="horiz-line" x1="250" y1="170" x2="650" y2="170" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="900" stroke-dashoffset="900"/>

  <!-- Small decorative text -->
  <text x="30" y="285" font-family="monospace" font-size="9" fill="#7B00FF" opacity="0.4">sys.init</text>
  <text x="810" y="285" font-family="monospace" font-size="9" fill="#7B00FF" opacity="0.4">v2.0.26</text>
  <text x="30" y="25" font-family="monospace" font-size="9" fill="#00FFFF" opacity="0.3">0x15FPS</text>
  <text x="820" y="25" font-family="monospace" font-size="9" fill="#00FFFF" opacity="0.3">ONLINE</text>
</svg>
