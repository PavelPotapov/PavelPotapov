<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bugGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF00FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B00FF" stop-opacity="0"/>
      <stop offset="60%" stop-color="#7B00FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <style>
    /* ===== CHARACTER ACTIONS ===== */
    /* 12s cycle: run, jump(ground bug), run, duck(flying bug), run, jump(gap), run, duck(flying bug) */
    @keyframes charAction {
      0%, 10%    { transform: translateY(0) scaleY(1); }      /* run */
      12%        { transform: translateY(-40px) scaleY(1); }   /* jump up */
      15%        { transform: translateY(-40px) scaleY(1); }   /* hang */
      18%        { transform: translateY(0) scaleY(1); }       /* land */
      20%, 33%   { transform: translateY(0) scaleY(1); }       /* run */
      36%        { transform: translateY(12px) scaleY(0.6); }  /* duck */
      40%        { transform: translateY(12px) scaleY(0.6); }  /* stay ducked */
      43%        { transform: translateY(0) scaleY(1); }       /* stand up */
      45%, 58%   { transform: translateY(0) scaleY(1); }       /* run */
      60%        { transform: translateY(-40px) scaleY(1); }   /* jump */
      63%        { transform: translateY(-40px) scaleY(1); }   /* hang */
      66%        { transform: translateY(0) scaleY(1); }       /* land */
      68%, 82%   { transform: translateY(0) scaleY(1); }       /* run */
      85%        { transform: translateY(12px) scaleY(0.6); }  /* duck */
      89%        { transform: translateY(12px) scaleY(0.6); }  /* stay ducked */
      92%        { transform: translateY(0) scaleY(1); }       /* stand up */
      94%, 100%  { transform: translateY(0) scaleY(1); }       /* run */
    }

    /* ===== OBSTACLES scroll right to left ===== */
    /* Ground bug 1 — arrives at char position (~15% of cycle) */
    @keyframes obst1 {
      0%   { transform: translateX(750px); }
      100% { transform: translateX(-100px); }
    }
    /* Flying bug — arrives at char position (~38% of cycle) */
    @keyframes obst2 {
      0%   { transform: translateX(750px); }
      100% { transform: translateX(-100px); }
    }
    /* Ground gap — arrives at char position (~62% of cycle) */
    @keyframes obst3 {
      0%   { transform: translateX(750px); }
      100% { transform: translateX(-100px); }
    }
    /* Flying bug 2 — arrives at char position (~87% of cycle) */
    @keyframes obst4 {
      0%   { transform: translateX(750px); }
      100% { transform: translateX(-100px); }
    }

    @keyframes bugWalk {
      0%, 50% { transform: translateY(0); }
      25% { transform: translateY(-2px); }
      75% { transform: translateY(1px); }
    }
    @keyframes bugFly {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes bugWings {
      0%, 50% { transform: scaleY(1); }
      25%, 75% { transform: scaleY(0.4); }
    }
    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(20px); }
    }
    @keyframes glitch1 {
      0%, 92%, 100% { transform: translate(0, 0); }
      93% { transform: translate(-3px, 1px); }
      95% { transform: translate(3px, -1px); }
      97% { transform: translate(-2px, 0); }
    }
    @keyframes particleFade {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes cornerPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    @keyframes subtitleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes groundPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes scorePulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .char-action   { animation: charAction 12s ease-in-out infinite; transform-origin: center bottom; }
    .obst-1        { animation: obst1 4s linear infinite; }
    .obst-2        { animation: obst2 4s linear infinite 1s; }
    .obst-3        { animation: obst3 4s linear infinite 2s; }
    .obst-4        { animation: obst4 4s linear infinite 3s; }
    .bug-walk      { animation: bugWalk 0.3s linear infinite; }
    .bug-fly       { animation: bugFly 0.5s ease-in-out infinite; }
    .bug-wings     { animation: bugWings 0.12s linear infinite; }
    .grid-group    { animation: gridScroll 4s linear infinite; }
    .title-main    { animation: glitch1 8s ease-in-out infinite; }
    .particle      { animation: particleFade 3s ease-in-out infinite; }
    .corner-accent { animation: cornerPulse 4s ease-in-out infinite; }
    .subtitle      { animation: subtitleFloat 5s ease-in-out infinite; }
    .ground-line   { animation: groundPulse 3s ease-in-out infinite; }
    .score         { animation: scorePulse 2s ease-in-out infinite; }
  </style>

  <!-- ===== BACKGROUND ===== -->
  <rect width="900" height="400" fill="#0D1117"/>

  <!-- Perspective grid -->
  <g class="grid-group" opacity="0.12">
    <line x1="450" y1="160" x2="0" y2="400" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="160" x2="150" y2="400" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="160" x2="300" y2="400" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="160" x2="450" y2="400" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="160" x2="600" y2="400" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="160" x2="750" y2="400" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="450" y1="160" x2="900" y2="400" stroke="#7B00FF" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="900" y2="280" stroke="#7B00FF" stroke-width="0.3"/>
    <line x1="0" y1="320" x2="900" y2="320" stroke="#7B00FF" stroke-width="0.3"/>
    <line x1="0" y1="360" x2="900" y2="360" stroke="#7B00FF" stroke-width="0.3"/>
  </g>
  <rect x="0" y="200" width="900" height="200" fill="url(#gridGrad)"/>

  <!-- Particles -->
  <circle cx="120" cy="60" r="1.5" fill="#00FFFF" class="particle" opacity="0"/>
  <circle cx="780" cy="80" r="1" fill="#FF00FF" class="particle" opacity="0" style="animation-delay:0.5s"/>
  <circle cx="300" cy="40" r="1.2" fill="#7B00FF" class="particle" opacity="0" style="animation-delay:1s"/>
  <circle cx="600" cy="50" r="1.8" fill="#00FFFF" class="particle" opacity="0" style="animation-delay:1.5s"/>
  <circle cx="200" cy="90" r="1" fill="#FF00FF" class="particle" opacity="0" style="animation-delay:2s"/>
  <circle cx="700" cy="35" r="1.3" fill="#00FFFF" class="particle" opacity="0" style="animation-delay:2.5s"/>
  <circle cx="500" cy="70" r="0.8" fill="#FF00FF" class="particle" opacity="0" style="animation-delay:0.8s"/>

  <!-- Corner accents -->
  <g class="corner-accent">
    <polyline points="10,10 10,40 40,40" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
    <polyline points="890,10 890,40 860,40" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
    <polyline points="10,390 10,360 40,360" fill="none" stroke="#FF00FF" stroke-width="1" opacity="0.5"/>
    <polyline points="890,390 890,360 860,360" fill="none" stroke="#FF00FF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- HUD text -->
  <text x="30" y="25" font-family="monospace" font-size="9" fill="#00FFFF" opacity="0.3">0x15FPS</text>
  <text x="830" y="25" font-family="monospace" font-size="9" fill="#00FFFF" opacity="0.3">ONLINE</text>
  <text x="30" y="385" font-family="monospace" font-size="9" fill="#7B00FF" opacity="0.4">sys.init</text>
  <text x="820" y="385" font-family="monospace" font-size="9" fill="#7B00FF" opacity="0.4">v2.0.26</text>

  <!-- ===== TITLE ===== -->
  <text class="title-main" x="450" y="120" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="72" font-weight="bold" fill="url(#titleGrad)" filter="url(#glowStrong)">15fps</text>
  <text x="450" y="120" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="72" font-weight="bold" fill="#FF00FF" opacity="0.3" filter="url(#glow)">15fps</text>

  <text class="subtitle" x="450" y="155" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="16" fill="#A0A0FF" letter-spacing="6">FRONTEND ENGINEER</text>

  <!-- Score display -->
  <text class="score" x="450" y="195" text-anchor="middle" font-family="monospace" font-size="10" fill="#00FFFF" opacity="0.4">BUGS DODGED: &#8734;</text>

  <!-- ===== GROUND LINE ===== -->
  <line x1="40" y1="340" x2="860" y2="340" stroke="url(#groundGrad)" stroke-width="2" filter="url(#glow)" class="ground-line"/>
  <!-- Ground surface dashes -->
  <line x1="80" y1="342" x2="820" y2="342" stroke="#7B00FF" stroke-width="0.5" stroke-dasharray="3 10" opacity="0.4"/>

  <!-- ===== GROUND BUG 1 (character jumps over) ===== -->
  <g class="obst-1">
    <g class="bug-walk" transform="translate(0, 318)">
      <!-- Bug body -->
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#FF1030" filter="url(#bugGlow)"/>
      <!-- Shell line -->
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#0D1117" stroke-width="1"/>
      <!-- Spots -->
      <circle cx="-4" cy="-2" r="2" fill="#CC0020"/>
      <circle cx="4" cy="2" r="1.8" fill="#CC0020"/>
      <!-- Eyes -->
      <circle cx="-5" cy="-4" r="2" fill="#FFFFFF"/>
      <circle cx="5" cy="-4" r="2" fill="#FFFFFF"/>
      <circle cx="-5" cy="-4" r="1" fill="#0D1117"/>
      <circle cx="5" cy="-4" r="1" fill="#0D1117"/>
      <!-- Legs -->
      <line x1="-8" y1="4" x2="-14" y2="12" stroke="#FF1030" stroke-width="1.2"/>
      <line x1="8" y1="4" x2="14" y2="12" stroke="#FF1030" stroke-width="1.2"/>
      <line x1="-10" y1="0" x2="-15" y2="5" stroke="#FF1030" stroke-width="1"/>
      <line x1="10" y1="0" x2="15" y2="5" stroke="#FF1030" stroke-width="1"/>
      <line x1="-9" y1="-3" x2="-14" y2="-1" stroke="#FF1030" stroke-width="1"/>
      <line x1="9" y1="-3" x2="14" y2="-1" stroke="#FF1030" stroke-width="1"/>
      <!-- Antennae -->
      <line x1="-5" y1="-8" x2="-10" y2="-16" stroke="#FF1030" stroke-width="0.8"/>
      <line x1="5" y1="-8" x2="10" y2="-16" stroke="#FF1030" stroke-width="0.8"/>
      <circle cx="-10" cy="-16" r="1.5" fill="#FF6080"/>
      <circle cx="10" cy="-16" r="1.5" fill="#FF6080"/>
      <!-- Label -->
      <text x="0" y="3" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#FFFFFF" opacity="0.9">BUG</text>
    </g>
  </g>

  <!-- ===== FLYING BUG (character ducks under) ===== -->
  <g class="obst-2">
    <g class="bug-fly" transform="translate(0, 278)">
      <!-- Bug body -->
      <ellipse cx="0" cy="0" rx="11" ry="7" fill="#FF1030" filter="url(#bugGlow)"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#0D1117" stroke-width="1"/>
      <circle cx="-4" cy="-2" r="1.5" fill="#CC0020"/>
      <circle cx="4" cy="2" r="1.5" fill="#CC0020"/>
      <!-- Eyes (angry) -->
      <circle cx="-4" cy="-3" r="1.8" fill="#FFFFFF"/>
      <circle cx="4" cy="-3" r="1.8" fill="#FFFFFF"/>
      <circle cx="-4" cy="-3" r="0.9" fill="#0D1117"/>
      <circle cx="4" cy="-3" r="0.9" fill="#0D1117"/>
      <!-- Angry eyebrows -->
      <line x1="-6" y1="-6" x2="-2" y2="-5" stroke="#0D1117" stroke-width="1"/>
      <line x1="6" y1="-6" x2="2" y2="-5" stroke="#0D1117" stroke-width="1"/>
      <!-- Wings -->
      <g class="bug-wings" style="transform-origin: center center;">
        <ellipse cx="-8" cy="-6" rx="7" ry="4" fill="#FF1030" opacity="0.25"/>
        <ellipse cx="8" cy="-6" rx="7" ry="4" fill="#FF1030" opacity="0.25"/>
      </g>
      <!-- Antennae -->
      <line x1="-4" y1="-7" x2="-8" y2="-14" stroke="#FF1030" stroke-width="0.8"/>
      <line x1="4" y1="-7" x2="8" y2="-14" stroke="#FF1030" stroke-width="0.8"/>
      <circle cx="-8" cy="-14" r="1.3" fill="#FF6080"/>
      <circle cx="8" cy="-14" r="1.3" fill="#FF6080"/>
      <!-- Label -->
      <text x="0" y="3" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#FFFFFF" opacity="0.9">BUG</text>
    </g>
  </g>

  <!-- ===== GROUND BUG 2 (character jumps) ===== -->
  <g class="obst-3">
    <g class="bug-walk" transform="translate(0, 320)">
      <ellipse cx="0" cy="0" rx="10" ry="7" fill="#FF1030" filter="url(#bugGlow)"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#0D1117" stroke-width="1"/>
      <circle cx="-3" cy="-2" r="1.5" fill="#CC0020"/>
      <circle cx="3" cy="2" r="1.3" fill="#CC0020"/>
      <circle cx="-4" cy="-3" r="1.8" fill="#FFFFFF"/>
      <circle cx="4" cy="-3" r="1.8" fill="#FFFFFF"/>
      <circle cx="-4" cy="-3" r="0.9" fill="#0D1117"/>
      <circle cx="4" cy="-3" r="0.9" fill="#0D1117"/>
      <line x1="-7" y1="4" x2="-12" y2="10" stroke="#FF1030" stroke-width="1.2"/>
      <line x1="7" y1="4" x2="12" y2="10" stroke="#FF1030" stroke-width="1.2"/>
      <line x1="-8" y1="0" x2="-13" y2="4" stroke="#FF1030" stroke-width="1"/>
      <line x1="8" y1="0" x2="13" y2="4" stroke="#FF1030" stroke-width="1"/>
      <line x1="-4" y1="-7" x2="-8" y2="-14" stroke="#FF1030" stroke-width="0.8"/>
      <line x1="4" y1="-7" x2="8" y2="-14" stroke="#FF1030" stroke-width="0.8"/>
      <circle cx="-8" cy="-14" r="1.3" fill="#FF6080"/>
      <circle cx="8" cy="-14" r="1.3" fill="#FF6080"/>
      <text x="0" y="3" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#FFFFFF" opacity="0.9">BUG</text>
    </g>
  </g>

  <!-- ===== FLYING BUG 2 (character ducks) ===== -->
  <g class="obst-4">
    <g class="bug-fly" transform="translate(0, 282)">
      <ellipse cx="0" cy="0" rx="10" ry="6.5" fill="#FF1030" filter="url(#bugGlow)"/>
      <line x1="0" y1="-6.5" x2="0" y2="6.5" stroke="#0D1117" stroke-width="1"/>
      <circle cx="-4" cy="-3" r="1.6" fill="#FFFFFF"/>
      <circle cx="4" cy="-3" r="1.6" fill="#FFFFFF"/>
      <circle cx="-4" cy="-3" r="0.8" fill="#0D1117"/>
      <circle cx="4" cy="-3" r="0.8" fill="#0D1117"/>
      <line x1="-5.5" y1="-5.5" x2="-2" y2="-5" stroke="#0D1117" stroke-width="1"/>
      <line x1="5.5" y1="-5.5" x2="2" y2="-5" stroke="#0D1117" stroke-width="1"/>
      <g class="bug-wings" style="transform-origin: center center;">
        <ellipse cx="-7" cy="-5" rx="6" ry="3.5" fill="#FF1030" opacity="0.25"/>
        <ellipse cx="7" cy="-5" rx="6" ry="3.5" fill="#FF1030" opacity="0.25"/>
      </g>
      <line x1="-4" y1="-6.5" x2="-7" y2="-13" stroke="#FF1030" stroke-width="0.8"/>
      <line x1="4" y1="-6.5" x2="7" y2="-13" stroke="#FF1030" stroke-width="0.8"/>
      <circle cx="-7" cy="-13" r="1.2" fill="#FF6080"/>
      <circle cx="7" cy="-13" r="1.2" fill="#FF6080"/>
      <text x="0" y="2.5" text-anchor="middle" font-family="monospace" font-size="6" font-weight="bold" fill="#FFFFFF" opacity="0.9">BUG</text>
    </g>
  </g>

  <!-- ===== CHARACTER (stays at x=180) ===== -->
  <g transform="translate(180, 0)">
    <g class="char-action" style="transform-origin: 0px 340px;">

      <!-- Head -->
      <circle cx="0" cy="290" r="8" fill="#A0A0FF"/>
      <!-- Hair/beanie -->
      <path d="M-7,286 Q-8,278 0,276 Q8,278 7,286" fill="#7B00FF"/>
      <!-- Glasses -->
      <rect x="-6.5" y="287" width="5" height="4" rx="1" fill="#0D1117" stroke="#00FFFF" stroke-width="0.7"/>
      <rect x="1.5" y="287" width="5" height="4" rx="1" fill="#0D1117" stroke="#00FFFF" stroke-width="0.7"/>
      <line x1="-1.5" y1="289" x2="1.5" y2="289" stroke="#00FFFF" stroke-width="0.5"/>
      <circle cx="-4" cy="289" r="1" fill="#00FFFF"/>
      <circle cx="4" cy="289" r="1" fill="#00FFFF"/>

      <!-- Body (hoodie) -->
      <rect x="-7" y="298" width="14" height="18" rx="3" fill="#1a1a3e"/>
      <path d="M-4,298 L0,303 L4,298" fill="none" stroke="#7B00FF" stroke-width="0.8"/>
      <rect x="-4" y="308" width="8" height="4" rx="1" fill="none" stroke="#7B00FF" stroke-width="0.5" opacity="0.4"/>

      <!-- Laptop -->
      <g transform="translate(9, 304)">
        <rect x="0" y="0" width="10" height="7" rx="1" fill="#1a1a2e" stroke="#7B00FF" stroke-width="0.6"/>
        <rect x="1" y="1" width="8" height="5" rx="0.5" fill="#00FFFF" opacity="0.8"/>
        <text x="5" y="4.5" text-anchor="middle" font-family="monospace" font-size="3.5" fill="#0D1117">&gt;_</text>
        <rect x="-0.5" y="7" width="11" height="1.5" rx="0.5" fill="#1a1a2e" stroke="#7B00FF" stroke-width="0.4"/>
      </g>

      <!-- Arms -->
      <line x1="7" y1="302" x2="11" y2="308" stroke="#A0A0FF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-7" y1="302" x2="-5" y2="310" stroke="#A0A0FF" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Left leg -->
      <line x1="-4" y1="316" x2="-6" y2="335" stroke="#1a1a3e" stroke-width="3.5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="-12,-4,316;12,-4,316;-12,-4,316" dur="0.4s" repeatCount="indefinite"/>
      </line>
      <ellipse cx="-8" cy="337" rx="4" ry="2" fill="#FF00FF">
        <animateTransform attributeName="transform" type="rotate" values="-12,-4,316;12,-4,316;-12,-4,316" dur="0.4s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Right leg -->
      <line x1="4" y1="316" x2="6" y2="335" stroke="#1a1a3e" stroke-width="3.5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="12,4,316;-12,4,316;12,4,316" dur="0.4s" repeatCount="indefinite"/>
      </line>
      <ellipse cx="8" cy="337" rx="4" ry="2" fill="#FF00FF">
        <animateTransform attributeName="transform" type="rotate" values="12,4,316;-12,4,316;12,4,316" dur="0.4s" repeatCount="indefinite"/>
      </ellipse>

    </g>
  </g>

</svg>
