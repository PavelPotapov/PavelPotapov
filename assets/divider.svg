<svg xmlns="http://www.w3.org/2000/svg" width="900" height="80" viewBox="0 0 900 80">
  <defs>
    <linearGradient id="neonLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF00FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FF00FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#FF00FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bugGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* --- Character run cycle --- */
    @keyframes run {
      0%   { transform: translateX(80px); }
      100% { transform: translateX(820px); }
    }
    @keyframes jump {
      0%, 18%, 22%, 48%, 52%, 78%, 82%, 100% { transform: translateY(0); }
      20% { transform: translateY(-22px); }
      50% { transform: translateY(-22px); }
      80% { transform: translateY(-22px); }
    }
    @keyframes legL {
      0%, 50% { transform: rotate(-20deg); }
      25%, 75% { transform: rotate(20deg); }
    }
    @keyframes legR {
      0%, 50% { transform: rotate(20deg); }
      25%, 75% { transform: rotate(-20deg); }
    }
    @keyframes armSwing {
      0%, 50% { transform: rotate(15deg); }
      25%, 75% { transform: rotate(-15deg); }
    }
    @keyframes screenBlink {
      0%, 48%, 52%, 100% { fill: #00FFFF; }
      50% { fill: #7B00FF; }
    }

    /* --- Bugs flying right to left --- */
    @keyframes bug1 {
      0%   { transform: translateX(900px); }
      100% { transform: translateX(-40px); }
    }
    @keyframes bug2 {
      0%   { transform: translateX(900px); }
      100% { transform: translateX(-40px); }
    }
    @keyframes bug3 {
      0%   { transform: translateX(900px); }
      100% { transform: translateX(-40px); }
    }
    @keyframes bugWings {
      0%, 50% { transform: scaleX(1); }
      25%, 75% { transform: scaleX(0.6); }
    }
    @keyframes bugFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* --- Ground pulse --- */
    @keyframes groundPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Apply animations */
    .runner       { animation: run 8s linear infinite; }
    .runner-jump  { animation: jump 8s ease-in-out infinite; }
    .leg-l        { animation: legL 0.3s linear infinite; transform-origin: center top; }
    .leg-r        { animation: legR 0.3s linear infinite; transform-origin: center top; }
    .arm          { animation: armSwing 0.3s linear infinite; transform-origin: center top; }
    .screen       { animation: screenBlink 4s ease-in-out infinite; }

    .bug-1        { animation: bug1 4s linear infinite; }
    .bug-2        { animation: bug2 4s linear infinite 1.33s; }
    .bug-3        { animation: bug3 4s linear infinite 2.66s; }
    .bug-wings    { animation: bugWings 0.15s linear infinite; transform-origin: center center; }
    .bug-body-float { animation: bugFloat 0.6s ease-in-out infinite; }

    .ground       { animation: groundPulse 3s ease-in-out infinite; }
  </style>

  <!-- Ground line -->
  <line x1="0" y1="60" x2="900" y2="60" stroke="url(#neonLine)" stroke-width="1.5" filter="url(#glow)" class="ground"/>
  <line x1="100" y1="60" x2="800" y2="60" stroke="#00FFFF" stroke-width="0.4" stroke-dasharray="4 8" opacity="0.4"/>

  <!-- === BUG 1 === -->
  <g class="bug-1">
    <g class="bug-body-float" transform="translate(0, 48)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="7" ry="5" fill="#FF2040" filter="url(#bugGlow)"/>
      <!-- Shell line -->
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#0D1117" stroke-width="0.8"/>
      <!-- Eyes -->
      <circle cx="-3" cy="-2" r="1" fill="#FFFFFF"/>
      <circle cx="3" cy="-2" r="1" fill="#FFFFFF"/>
      <!-- Legs -->
      <line x1="-5" y1="2" x2="-9" y2="6" stroke="#FF2040" stroke-width="0.8"/>
      <line x1="5" y1="2" x2="9" y2="6" stroke="#FF2040" stroke-width="0.8"/>
      <line x1="-6" y1="0" x2="-10" y2="3" stroke="#FF2040" stroke-width="0.8"/>
      <line x1="6" y1="0" x2="10" y2="3" stroke="#FF2040" stroke-width="0.8"/>
      <!-- Wings -->
      <g class="bug-wings">
        <ellipse cx="-5" cy="-4" rx="4" ry="2.5" fill="#FF2040" opacity="0.3"/>
        <ellipse cx="5" cy="-4" rx="4" ry="2.5" fill="#FF2040" opacity="0.3"/>
      </g>
      <!-- Antennae -->
      <line x1="-3" y1="-5" x2="-6" y2="-9" stroke="#FF2040" stroke-width="0.6"/>
      <line x1="3" y1="-5" x2="6" y2="-9" stroke="#FF2040" stroke-width="0.6"/>
      <circle cx="-6" cy="-9" r="0.8" fill="#FF6080"/>
      <circle cx="6" cy="-9" r="0.8" fill="#FF6080"/>
      <!-- Label -->
      <text x="0" y="14" text-anchor="middle" font-family="monospace" font-size="6" fill="#FF2040" opacity="0.7">bug</text>
    </g>
  </g>

  <!-- === BUG 2 === -->
  <g class="bug-2">
    <g class="bug-body-float" transform="translate(0, 45)">
      <ellipse cx="0" cy="0" rx="6" ry="4" fill="#FF6000" filter="url(#bugGlow)"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#0D1117" stroke-width="0.8"/>
      <circle cx="-2.5" cy="-1.5" r="0.8" fill="#FFFFFF"/>
      <circle cx="2.5" cy="-1.5" r="0.8" fill="#FFFFFF"/>
      <line x1="-4" y1="2" x2="-8" y2="5" stroke="#FF6000" stroke-width="0.7"/>
      <line x1="4" y1="2" x2="8" y2="5" stroke="#FF6000" stroke-width="0.7"/>
      <g class="bug-wings">
        <ellipse cx="-4" cy="-3" rx="3.5" ry="2" fill="#FF6000" opacity="0.3"/>
        <ellipse cx="4" cy="-3" rx="3.5" ry="2" fill="#FF6000" opacity="0.3"/>
      </g>
      <line x1="-2" y1="-4" x2="-5" y2="-8" stroke="#FF6000" stroke-width="0.5"/>
      <line x1="2" y1="-4" x2="5" y2="-8" stroke="#FF6000" stroke-width="0.5"/>
      <circle cx="-5" cy="-8" r="0.7" fill="#FFA050"/>
      <circle cx="5" cy="-8" r="0.7" fill="#FFA050"/>
      <text x="0" y="12" text-anchor="middle" font-family="monospace" font-size="5" fill="#FF6000" opacity="0.7">404</text>
    </g>
  </g>

  <!-- === BUG 3 === -->
  <g class="bug-3">
    <g class="bug-body-float" transform="translate(0, 50)">
      <ellipse cx="0" cy="0" rx="5.5" ry="4" fill="#FF00FF" filter="url(#bugGlow)"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#0D1117" stroke-width="0.7"/>
      <circle cx="-2" cy="-1.5" r="0.8" fill="#FFFFFF"/>
      <circle cx="2" cy="-1.5" r="0.8" fill="#FFFFFF"/>
      <line x1="-4" y1="1" x2="-7" y2="4" stroke="#FF00FF" stroke-width="0.7"/>
      <line x1="4" y1="1" x2="7" y2="4" stroke="#FF00FF" stroke-width="0.7"/>
      <g class="bug-wings">
        <ellipse cx="-3.5" cy="-3" rx="3" ry="2" fill="#FF00FF" opacity="0.25"/>
        <ellipse cx="3.5" cy="-3" rx="3" ry="2" fill="#FF00FF" opacity="0.25"/>
      </g>
      <line x1="-2" y1="-4" x2="-4" y2="-7" stroke="#FF00FF" stroke-width="0.5"/>
      <line x1="2" y1="-4" x2="4" y2="-7" stroke="#FF00FF" stroke-width="0.5"/>
      <circle cx="-4" cy="-7" r="0.6" fill="#FF80FF"/>
      <circle cx="4" cy="-7" r="0.6" fill="#FF80FF"/>
      <text x="0" y="12" text-anchor="middle" font-family="monospace" font-size="5" fill="#FF00FF" opacity="0.7">err</text>
    </g>
  </g>

  <!-- === RUNNER (programmer with laptop) === -->
  <g class="runner">
    <g class="runner-jump">
      <g transform="translate(0, 28)">
        <!-- Body -->
        <rect x="-4" y="8" width="8" height="12" rx="2" fill="#00FFFF" opacity="0.9"/>

        <!-- Head -->
        <circle cx="0" cy="4" r="5" fill="#A0A0FF"/>
        <!-- Headphones -->
        <path d="M-5,3 Q-6,-2 -3,-3" fill="none" stroke="#FF00FF" stroke-width="1.2"/>
        <path d="M5,3 Q6,-2 3,-3" fill="none" stroke="#FF00FF" stroke-width="1.2"/>
        <rect x="-6.5" y="1" width="2.5" height="3" rx="1" fill="#FF00FF"/>
        <rect x="4" y="1" width="2.5" height="3" rx="1" fill="#FF00FF"/>
        <!-- Eyes (glasses) -->
        <rect x="-4" y="2" width="3" height="2.5" rx="0.5" fill="none" stroke="#00FFFF" stroke-width="0.5"/>
        <rect x="1" y="2" width="3" height="2.5" rx="0.5" fill="none" stroke="#00FFFF" stroke-width="0.5"/>
        <circle cx="-2.5" cy="3.2" r="0.6" fill="#00FFFF"/>
        <circle cx="2.5" cy="3.2" r="0.6" fill="#00FFFF"/>

        <!-- Laptop -->
        <g transform="translate(6, 12)">
          <rect x="0" y="0" width="7" height="5" rx="0.5" fill="#1a1a2e" stroke="#7B00FF" stroke-width="0.5"/>
          <rect x="0.8" y="0.8" width="5.4" height="3.4" rx="0.3" class="screen"/>
          <text x="3.5" y="3.2" text-anchor="middle" font-family="monospace" font-size="2.5" fill="#0D1117">&gt;_</text>
          <rect x="-1" y="5" width="9" height="1" rx="0.3" fill="#1a1a2e" stroke="#7B00FF" stroke-width="0.4"/>
        </g>

        <!-- Arm holding laptop -->
        <g class="arm">
          <line x1="4" y1="12" x2="8" y2="15" stroke="#A0A0FF" stroke-width="2" stroke-linecap="round"/>
        </g>

        <!-- Left leg -->
        <g class="leg-l">
          <line x1="-2" y1="20" x2="-4" y2="30" stroke="#A0A0FF" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="-6" y="29" width="4" height="2" rx="1" fill="#7B00FF"/>
        </g>

        <!-- Right leg -->
        <g class="leg-r">
          <line x1="2" y1="20" x2="4" y2="30" stroke="#A0A0FF" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="2" y="29" width="4" height="2" rx="1" fill="#7B00FF"/>
        </g>
      </g>
    </g>
  </g>
</svg>
